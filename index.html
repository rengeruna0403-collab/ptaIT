<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PTA IT ナレッジベース</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ヘッダー -->
<header class="app-header">
  <div class="header-top">
    <div class="header-icon">💬</div>
    <div>
      <h1>PTA IT ナレッジベース</h1>
      <div class="sub">Google Workspace・引き継ぎ・IT操作のよくある質問</div>
    </div>
    <a href="admin.html" style="margin-left:auto;color:rgba(255,255,255,.7);font-size:.75rem;text-decoration:none;white-space:nowrap">⚙️ 管理</a>
  </div>
  <nav class="mode-tabs">
    <button class="mode-tab active" onclick="switchMode('chat',this)">💬 チャット</button>
    <button class="mode-tab" onclick="switchMode('browse',this)">🔍 さがす・しぼる</button>
  </nav>
</header>

<!-- 注意バナー -->
<div class="privacy-banner">
  <span>⚠️ <strong>パスワード・認証コード・児童名簿・住所・電話番号などの個人情報はここに入力しないでください。</strong>　判断に迷う場合はPTA連合会担当者に確認してください。</span>
</div>

<div class="app-wrapper">

  <!-- ── チャットモード ─────────────────────────── -->
  <div id="panel-chat" class="mode-panel active">
    <div class="chat-shell">
      <div id="chat-area"></div>
      <div class="input-bar">
        <textarea id="user-input" rows="1" placeholder="お困りのことを入力してください（例：フォームを作りたい）"></textarea>
        <button id="send-btn" title="送信">▶</button>
      </div>
    </div>
  </div>

  <!-- ── ブラウズモード ─────────────────────────── -->
  <div id="panel-browse" class="mode-panel">
    <div class="browse-shell">

      <!-- 特別ビュー -->
      <div class="special-view-bar">
        <button class="sv-btn" onclick="applySpecialView('frequent',this)">⭐ よくある質問</button>
        <button class="sv-btn" onclick="applySpecialView('handover',this)">🤝 引き継ぎで確認すること</button>
        <button class="sv-btn" onclick="applySpecialView('yearstart',this)">🌸 年度初めによくある質問</button>
        <button class="sv-btn" onclick="applySpecialView('privacy',this)">🔒 個人情報注意の項目</button>
        <button class="sv-btn" onclick="applySpecialView('all',this)">📋 全て表示</button>
      </div>

      <!-- カテゴリフィルタ -->
      <div class="cat-filter-bar" id="cat-filter-bar">
        <button class="cf-btn active" onclick="applyCatFilter('',this)">すべて</button>
      </div>

      <!-- 検索 -->
      <div class="browse-search">
        <input type="text" id="browse-input" placeholder="キーワードで検索（例：PDF、引き継ぎ、フォーム）" oninput="onBrowseSearch(this.value)">
      </div>

      <div class="results-header" id="results-header">読み込み中...</div>
      <div class="faq-card-grid" id="faq-card-grid"></div>
    </div>
  </div>

</div>

<!-- 管理者オーバーレイ（チャット画面から） -->
<button id="admin-toggle">⚙️ 管理者</button>
<div id="admin-overlay" onclick="if(event.target===this)closeAdmin()">
  <div class="admin-modal">
    <h2>⚙️ FAQ 管理パネル</h2>
    <p style="font-size:.78rem;color:var(--gray-600);margin-bottom:12px">
      恒久的な変更は <code>faqData.js</code> を直接編集してください。<br>
      詳しい管理は <a href="admin.html" target="_blank">管理ページ（admin.html）</a> をご覧ください。
    </p>
    <div class="admin-faq-list" id="modal-faq-list"></div>
    <div id="modal-edit-form" style="display:none;margin-top:14px">
      <input type="hidden" id="edit-id">
      <div class="admin-form">
        <label>質問タイトル<input type="text" id="edit-title"></label>
        <label>一言まとめ<textarea id="edit-summary"></textarea></label>
        <label>キーワード（カンマ区切り）<input type="text" id="edit-keywords"></label>
        <div style="display:flex;gap:8px">
          <button class="admin-save-btn" onclick="saveEdit()">保存</button>
          <button class="admin-close-btn" onclick="document.getElementById('modal-edit-form').style.display='none'">キャンセル</button>
        </div>
      </div>
    </div>
    <div style="text-align:right;margin-top:16px">
      <button class="admin-close-btn" onclick="closeAdmin()">閉じる</button>
    </div>
  </div>
</div>

<script src="faqData.js"></script>
<script src="script.js"></script>
</body>
</html>
